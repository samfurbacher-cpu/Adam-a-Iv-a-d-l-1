<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Adam a Ivča – hra</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB;
            font-family: Arial, sans-serif;
        }

        #startScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 32px;
        }

        #startBtn {
            padding: 20px 40px;
            font-size: 28px;
            cursor: pointer;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .btn {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
    </style>
</head>

<body>

    <div id="startScreen">
        <div>Adamova mise</div>
        <button id="startBtn">Start</button>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="controls">
        <div id="leftBtn" class="btn">◀</div>
        <div id="jumpBtn" class="btn">⤒</div>
        <div id="rightBtn" class="btn">▶</div>
    </div>

    <script src="script.js"></script>

</body>
</html>
