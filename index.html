<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Adam a Ivča – díl 1</title>
  <style>
    body {
      margin: 0;
      background: #87CEEB;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    #gameCanvas {
      display: block;
      background: #87CEEB;
    }
    #startScreen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      z-index: 10;
    }
    #startBtn {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 24px;
      cursor: pointer;
    }

    /* MOBILNÍ OVLÁDÁNÍ */
    #controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .control-group {
      display: flex;
      gap: 20px;
      pointer-events: auto;
      padding: 0 20px;
    }

    .btn {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.4);
      border: 2px solid white;
      border-radius: 15px;
      font-size: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    #jumpBtn {
      width: 120px;
      height: 80px;
      font-size: 26px;
    }
  </style>
</head>
<body>

<div id="startScreen">
  <div>Adam a Ivča – díl 1</div>
  <button id="startBtn">Start</button>
</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<!-- MOBILNÍ OVLÁDÁNÍ -->
<div id="controls">
  <div class="control-group" id="leftControls">
    <div class="btn" id="leftBtn">←</div>
    <div class="btn" id="rightBtn">→</div>
  </div>

  <div class="control-group" id="rightControls">
    <div class="btn" id="jumpBtn">SKOK</div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
